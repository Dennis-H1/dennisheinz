name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Lighthouse CI
        if: github.event_name == 'pull_request'
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Upload build artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy (atomic release + symlink swap)
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DEPLOY_ROOT: /var/www/dennisheinz
          KEEP_RELEASES: "5"
        run: |
          user="${VPS_USER//[$'\r\n ']/}"
          host="${VPS_HOST//[$'\r\n ']/}"
          release="$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"

          rsync -az --delete \
            dist/ \
            "${user}@${host}:${DEPLOY_ROOT}/releases/${release}/"

          ssh "${user}@${host}" bash -s <<EOF
          set -euo pipefail
          ln -sfn "${DEPLOY_ROOT}/releases/${release}" "${DEPLOY_ROOT}/current.new"
          mv -Tf "${DEPLOY_ROOT}/current.new" "${DEPLOY_ROOT}/current"
          cd "${DEPLOY_ROOT}/releases"
          ls -1t | tail -n +$((${KEEP_RELEASES} + 1)) | xargs -r rm -rf
          EOF
