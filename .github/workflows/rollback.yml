name: Rollback

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Release to roll back to. Use "previous" (default) or a specific release name like 20260524-141500-def5678.'
        required: true
        default: "previous"

permissions:
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Swap symlink to target release
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DEPLOY_ROOT: /var/www/dennisheinz
          TARGET: ${{ inputs.release }}
        run: |
          user="${VPS_USER//[$'\r\n ']/}"
          host="${VPS_HOST//[$'\r\n ']/}"

          ssh "${user}@${host}" bash -s <<EOF
          set -euo pipefail
          cd "${DEPLOY_ROOT}/releases"

          current_path="\$(readlink "${DEPLOY_ROOT}/current")"
          current_name="\$(basename "\$current_path")"

          if [ "${TARGET}" = "previous" ]; then
            target_name="\$(ls -1 | sort -r | awk -v cur="\$current_name" 'found {print; exit} \$0 == cur {found=1}')"
            if [ -z "\$target_name" ]; then
              echo "::error::No previous release available. Releases on disk:"
              ls -1
              exit 1
            fi
          else
            target_name="${TARGET}"
          fi

          if [ ! -d "\$target_name" ]; then
            echo "::error::Release '\$target_name' does not exist. Available:"
            ls -1
            exit 1
          fi

          if [ "\$target_name" = "\$current_name" ]; then
            echo "::warning::Target '\$target_name' is already live. Nothing to do."
            exit 0
          fi

          ln -sfn "${DEPLOY_ROOT}/releases/\$target_name" "${DEPLOY_ROOT}/current.new"
          mv -Tf "${DEPLOY_ROOT}/current.new" "${DEPLOY_ROOT}/current"

          echo "Was live:  \$current_name"
          echo "Now live:  \$target_name"
          EOF
