<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dennis Heinz — coming soon</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #f0ede8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            gap: 3rem;
        }

        h1 {
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #f0ede8;
            opacity: 0.9;
        }

        .timer {
            display: flex;
            gap: clamp(1rem, 4vw, 2.5rem);
            align-items: flex-start;
        }

        .unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .digits {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 300;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
            color: #f0ede8;
            min-width: 2ch;
            text-align: center;
        }

        .label {
            font-size: clamp(0.55rem, 1.5vw, 0.7rem);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #888;
        }

        .sep {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 200;
            line-height: 1;
            color: #333;
            padding-top: 0;
        }

        .done {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: #f0ede8;
            display: none;
        }
    </style>
</head>

<body>
    <h1>Dennis Heinz — coming soon</h1>

    <div class="timer" id="timer">
        <div class="unit">
            <span class="digits" id="days">07</span>
            <span class="label">days</span>
        </div>
        <span class="sep">:</span>
        <div class="unit">
            <span class="digits" id="hours">00</span>
            <span class="label">hours</span>
        </div>
        <span class="sep">:</span>
        <div class="unit">
            <span class="digits" id="minutes">00</span>
            <span class="label">minutes</span>
        </div>
        <span class="sep">:</span>
        <div class="unit">
            <span class="digits" id="seconds">00</span>
            <span class="label">seconds</span>
        </div>
    </div>

    <p class="done" id="done">it's time.</p>

    <script>
        const deadline = new Date('2026-05-09T00:00:00');

        function pad(n) {
            return String(Math.max(0, n)).padStart(2, '0');
        }

        function tick() {
            const now = new Date();
            const diff = deadline - now;

            if (diff <= 0) {
                document.getElementById('timer').style.display = 'none';
                document.getElementById('done').style.display = 'block';
                return;
            }

            const days = Math.floor(diff / 86400000);
            const hours = Math.floor((diff % 86400000) / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);

            document.getElementById('days').textContent = pad(days);
            document.getElementById('hours').textContent = pad(hours);
            document.getElementById('minutes').textContent = pad(minutes);
            document.getElementById('seconds').textContent = pad(seconds);
        }

        tick();
        setInterval(tick, 1000);
    </script>
</body>

</html>
